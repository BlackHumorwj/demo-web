<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Page Not Found</title>
  <script>
    const path = window.location.pathname
    const repoName = 'demo-web'
    const basePath = '/' + repoName + '/'
    if (!path.startsWith(basePath)) {
      window.location.href = basePath
    } else {
      window.history.replaceState({}, '', basePath)
      window.location.href = basePath
    }
  </script>
</head>
<body></body>
</html>
